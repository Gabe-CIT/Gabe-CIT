<svg fill="none" viewBox="0 0 850 290" width="850" height="290" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --bg:      #ffffff;
          --card:    #f6f8fa;
          --border:  #d0d7de;
          --text:    #1f2328;
          --muted:   #57606a;
          --accent:  #0969da;
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --bg:      #0d1117;
            --card:    #161b22;
            --border:  #30363d;
            --text:    #c9d1d9;
            --muted:   #8b949e;
            --accent:  #58a6ff;
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .wrap {
          width: 850px;
          height: 290px;
          background: var(--bg);
          padding: 24px 32px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          color: var(--text);
        }
        .title {
          font-size: 22px;
          font-weight: 700;
          letter-spacing: -0.3px;
        }
        .subtitle {
          font-size: 14px;
          color: var(--muted);
          margin-top: 4px;
          margin-bottom: 18px;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
        }
        .skill {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 14px 16px;
          display: flex;
          align-items: center;
          gap: 12px;
          opacity: 0;
          transform: translateY(8px);
          animation: rise 0.5s ease-out forwards;
        }
        .skill:nth-child(1) { animation-delay: 0.05s; }
        .skill:nth-child(2) { animation-delay: 0.10s; }
        .skill:nth-child(3) { animation-delay: 0.15s; }
        .skill:nth-child(4) { animation-delay: 0.20s; }
        .skill:nth-child(5) { animation-delay: 0.25s; }
        .skill:nth-child(6) { animation-delay: 0.30s; }
        .dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          flex-shrink: 0;
        }
        .py    { background: #3776ab; }
        .js    { background: #f7df1e; }
        .git   { background: #f05032; }
        .sh    { background: #4eaa25; }
        .win   { background: #0078d4; }
        .fix   { background: #d29922; }
        .label {
          font-size: 14px;
          font-weight: 600;
        }
        .level {
          font-size: 12px;
          color: var(--muted);
          margin-left: auto;
        }
        @keyframes rise {
          to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
          .skill { animation: none; opacity: 1; transform: none; }
        }
      </style>
      <div class="wrap">
        <div class="title">Tech Stack</div>
        <div class="subtitle">Tools I reach for, day to day</div>
        <div class="grid">
          <div class="skill"><span class="dot py"></span><span class="label">Python</span><span class="level">primary</span></div>
          <div class="skill"><span class="dot js"></span><span class="label">JavaScript</span><span class="level">secondary</span></div>
          <div class="skill"><span class="dot git"></span><span class="label">Git</span><span class="level">comfortable</span></div>
          <div class="skill"><span class="dot sh"></span><span class="label">Shell / CLI</span><span class="level">comfortable</span></div>
          <div class="skill"><span class="dot win"></span><span class="label">Windows Admin</span><span class="level">on the job</span></div>
          <div class="skill"><span class="dot fix"></span><span class="label">Troubleshooting</span><span class="level">specialty</span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

<!-- Skills card -->
<svg fill="none" viewBox="0 0 850 280" width="850" height="280" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --canvas:         #fafafa;
          --glass:          rgba(0, 0, 0, 0.035);
          --glass-elevated: rgba(0, 0, 0, 0.05);
          --hairline:       rgba(0, 0, 0, 0.10);
          --hairline-soft:  rgba(0, 0, 0, 0.06);
          --hairline-shine: rgba(255, 255, 255, 0.70);
          --pip-inactive:   rgba(0, 0, 0, 0.10);
          --text:           #1a1a1f;
          --muted:          #5a5a64;
          --accent:         #5e6ad2;
          --accent-glow:    rgba(94, 106, 210, 0.40);
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --canvas:         #07080a;
            --glass:          rgba(255, 255, 255, 0.045);
            --glass-elevated: rgba(255, 255, 255, 0.02);
            --hairline:       rgba(255, 255, 255, 0.08);
            --hairline-soft:  rgba(255, 255, 255, 0.05);
            --hairline-shine: rgba(255, 255, 255, 0.18);
            --pip-inactive:   rgba(255, 255, 255, 0.10);
            --text:           rgba(255, 255, 255, 0.92);
            --muted:          rgba(255, 255, 255, 0.5);
            --accent:         #7c83ff;
            --accent-glow:    rgba(124, 131, 255, 0.40);
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .canvas {
          width: 850px;
          height: 280px;
          background: var(--canvas);
          border-radius: 16px;
          overflow: hidden;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .panel {
          width: 100%;
          height: 100%;
          background: var(--glass);
          backdrop-filter: blur(24px) saturate(140%);
          -webkit-backdrop-filter: blur(24px) saturate(140%);
          border: 1px solid var(--hairline);
          border-radius: 16px;
          box-shadow: inset 0 1px 0 var(--hairline-shine);
          padding: 24px 32px;
          color: var(--text);
          display: flex;
          flex-direction: column;
        }
        .header { margin-bottom: 20px; }
        .eyebrow {
          font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
          font-size: 11px;
          font-weight: 600;
          color: var(--accent);
          letter-spacing: 0.16em;
          margin-bottom: 8px;
        }
        .title {
          font-size: 24px;
          font-weight: 600;
          letter-spacing: -0.4px;
        }
        .subtitle {
          font-size: 14px;
          color: var(--muted);
          margin-top: 4px;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
        }
        .skill {
          background: var(--glass-elevated);
          border: 1px solid var(--hairline-soft);
          border-radius: 10px;
          padding: 12px 16px;
          display: flex;
          align-items: center;
          gap: 12px;
          opacity: 0;
          transform: translateY(8px);
          animation: rise 0.5s ease-out forwards;
        }
        .skill:nth-child(1) { animation-delay: 0.05s; }
        .skill:nth-child(2) { animation-delay: 0.10s; }
        .skill:nth-child(3) { animation-delay: 0.15s; }
        .skill:nth-child(4) { animation-delay: 0.20s; }
        .skill:nth-child(5) { animation-delay: 0.25s; }
        .skill:nth-child(6) { animation-delay: 0.30s; }
        .dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          flex-shrink: 0;
          background: currentColor;
          box-shadow: 0 0 8px currentColor;
        }
        .py  { color: #3776ab; }
        .js  { color: #f7df1e; }
        .git { color: #f05032; }
        .sh  { color: #4eaa25; }
        .win { color: #0078d4; }
        .fix { color: #d29922; }
        .label {
          font-size: 14px;
          font-weight: 500;
          color: var(--text);
        }
        .pips {
          display: flex;
          gap: 3px;
          margin-left: auto;
        }
        .pip {
          width: 4px;
          height: 12px;
          border-radius: 2px;
          background: var(--pip-inactive);
        }
        .pip.on {
          background: var(--accent);
          box-shadow: 0 0 6px var(--accent-glow);
        }
        @keyframes rise {
          to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
          .skill { animation: none; opacity: 1; transform: none; }
        }
      </style>
      <div class="canvas">
        <div class="panel">
          <div class="header">
            <div class="eyebrow">// STACK</div>
            <div class="title">Tech stack</div>
            <div class="subtitle">Tools I reach for, day to day</div>
          </div>
          <div class="grid">
            <div class="skill">
              <span class="dot py"></span>
              <span class="label">Python</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip"></span></span>
            </div>
            <div class="skill">
              <span class="dot js"></span>
              <span class="label">JavaScript</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></span>
            </div>
            <div class="skill">
              <span class="dot git"></span>
              <span class="label">Git</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip"></span></span>
            </div>
            <div class="skill">
              <span class="dot sh"></span>
              <span class="label">Shell / PowerShell / CLI</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip"></span><span class="pip"></span></span>
            </div>
            <div class="skill">
              <span class="dot win"></span>
              <span class="label">Windows Admin</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></span>
            </div>
            <div class="skill">
              <span class="dot fix"></span>
              <span class="label">Troubleshooting</span>
              <span class="pips"><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

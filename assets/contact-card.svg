<!-- Contact card -->
<svg fill="none" viewBox="0 0 850 160" width="850" height="160" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --canvas:         #fafafa;
          --glass:          rgba(0, 0, 0, 0.035);
          --hairline:       rgba(0, 0, 0, 0.10);
          --hairline-shine: rgba(255, 255, 255, 0.70);
          --text:           #1a1a1f;
          --muted:          #5a5a64;
          --accent:         #5e6ad2;
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --canvas:         #07080a;
            --glass:          rgba(255, 255, 255, 0.045);
            --hairline:       rgba(255, 255, 255, 0.08);
            --hairline-shine: rgba(255, 255, 255, 0.18);
            --text:           rgba(255, 255, 255, 0.92);
            --muted:          rgba(255, 255, 255, 0.5);
            --accent:         #7c83ff;
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .canvas {
          width: 850px;
          height: 160px;
          background: var(--canvas);
          border-radius: 16px;
          overflow: hidden;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .panel {
          width: 100%;
          height: 100%;
          background: var(--glass);
          backdrop-filter: blur(24px) saturate(140%);
          -webkit-backdrop-filter: blur(24px) saturate(140%);
          border: 1px solid var(--hairline);
          border-radius: 16px;
          box-shadow: inset 0 1px 0 var(--hairline-shine);
          padding: 24px 32px;
          color: var(--text);
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .eyebrow {
          font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
          font-size: 11px;
          font-weight: 600;
          color: var(--accent);
          letter-spacing: 0.16em;
          margin-bottom: 8px;
        }
        .title {
          font-size: 24px;
          font-weight: 600;
          letter-spacing: -0.4px;
          display: flex;
          align-items: center;
        }
        .cursor {
          display: inline-block;
          width: 9px;
          height: 22px;
          background: var(--accent);
          margin-left: 6px;
          box-shadow: 0 0 8px var(--accent);
          animation: blink 1.1s steps(2, start) infinite;
        }
        .subtitle {
          font-size: 14px;
          color: var(--muted);
          margin-top: 8px;
          line-height: 1.5;
        }
        .arrow {
          color: var(--accent);
          font-weight: 600;
          font-size: 20px;
          line-height: 1;
          vertical-align: -3px;
          margin-left: 2px;
        }
        @keyframes blink {
          to { visibility: hidden; }
        }
        @media (prefers-reduced-motion: reduce) {
          .cursor { animation: none; }
        }
      </style>
      <div class="canvas">
        <div class="panel">
          <div class="eyebrow">// REACH_OUT</div>
          <div class="title">
            Find me here
            <span class="cursor"></span>
          </div>
          <div class="subtitle">
            Open to questions, collaboration, and learning opportunities.
            Links below <span class="arrow">↓</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

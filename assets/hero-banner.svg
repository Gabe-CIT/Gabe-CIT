<svg fill="none" viewBox="0 0 850 220" width="850" height="220" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --bg-from: #0969da;
          --bg-to:   #8250df;
          --text:    #ffffff;
          --muted:   rgba(255,255,255,0.85);
          --accent:  #f6f8fa;
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --bg-from: #1f6feb;
            --bg-to:   #a371f7;
            --text:    #ffffff;
            --muted:   rgba(255,255,255,0.85);
            --accent:  #f0f6fc;
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .banner {
          width: 850px;
          height: 220px;
          background: linear-gradient(120deg, var(--bg-from), var(--bg-to), var(--bg-from));
          background-size: 200% 200%;
          animation: shift 12s ease-in-out infinite;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 48px;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          color: var(--text);
        }
        .greeting {
          font-size: 18px;
          font-weight: 500;
          opacity: 0;
          animation: fadeIn 0.6s ease-out 0.2s forwards;
        }
        .wave { display: inline-block; animation: wave 2.4s ease-in-out infinite; transform-origin: 70% 70%; }
        .name {
          font-size: 56px;
          font-weight: 800;
          letter-spacing: -1px;
          margin-top: 6px;
          opacity: 0;
          animation: fadeIn 0.6s ease-out 0.5s forwards;
        }
        .role {
          font-size: 20px;
          font-weight: 500;
          color: var(--muted);
          margin-top: 8px;
          opacity: 0;
          animation: fadeIn 0.6s ease-out 0.8s forwards;
        }
        .underline {
          display: inline-block;
          height: 3px;
          width: 0;
          background: var(--accent);
          border-radius: 2px;
          margin-top: 12px;
          animation: grow 1s ease-out 1.2s forwards;
        }
        @keyframes shift {
          0%, 100% { background-position: 0% 50%; }
          50%      { background-position: 100% 50%; }
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes wave {
          0%, 60%, 100% { transform: rotate( 0deg); }
          10%, 30%      { transform: rotate(14deg); }
          20%           { transform: rotate(-8deg); }
          40%           { transform: rotate( 4deg); }
          50%           { transform: rotate(-4deg); }
        }
        @keyframes grow {
          to { width: 120px; }
        }
        @media (prefers-reduced-motion: reduce) {
          .banner, .greeting, .name, .role, .underline, .wave {
            animation: none !important;
            opacity: 1 !important;
          }
          .underline { width: 120px; }
        }
      </style>
      <div class="banner">
        <div class="greeting">Hi there <span class="wave">👋</span></div>
        <div class="name">Gabriel</div>
        <div class="role">IT Support Intern @ SRK Consulting · Vancouver</div>
        <div class="underline"></div>
      </div>
    </div>
  </foreignObject>
</svg>

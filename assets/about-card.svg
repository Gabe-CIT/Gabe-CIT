<!-- About card -->
<svg fill="none" viewBox="0 0 850 200" width="850" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --canvas:         #fafafa;
          --panel-bg:       rgba(255, 255, 255, 0.55);
          --panel-blur:     28px;
          --hairline:       rgba(0, 0, 0, 0.10);
          --hairline-shine: rgba(255, 255, 255, 0.70);
          --text:           #1a1a1f;
          --muted:          #5a5a64;
          --accent:         #5e6ad2;
          --grad-1:         #2563eb;
          --grad-2:         #9333ea;
          --grad-3:         #ec4899;
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --canvas:         #07080a;
            --panel-bg:       rgba(10, 10, 15, 0.40);
            --panel-blur:     32px;
            --hairline:       rgba(255, 255, 255, 0.08);
            --hairline-shine: rgba(255, 255, 255, 0.18);
            --text:           #f4f4f6;
            --muted:          #a4a8b0;
            --accent:         #7c83ff;
            --grad-1:         #1e3a8a;
            --grad-2:         #7e22ce;
            --grad-3:         #db2777;
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .canvas {
          position: relative;
          width: 850px;
          height: 200px;
          background: var(--canvas);
          border-radius: 16px;
          overflow: hidden;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .orb {
          position: absolute;
          width: 520px;
          height: 520px;
          border-radius: 50%;
          background: radial-gradient(circle at 30% 30%, var(--grad-3) 0%, var(--grad-2) 35%, var(--grad-1) 70%, transparent 100%);
          filter: blur(60px);
          opacity: 0.70;
          top: -440px;
          left: -60px;
          animation: drift 14s ease-in-out infinite alternate;
        }
        @keyframes drift {
          0%   { transform: translate(0, 0) scale(1); }
          33%  { transform: translate(150px, 30px) scale(1.05); }
          66%  { transform: translate(300px, -20px) scale(0.95); }
          100% { transform: translate(500px, 50px) scale(1.1); }
        }
        .panel {
          position: absolute;
          inset: 0;
          background: var(--panel-bg);
          backdrop-filter: blur(var(--panel-blur)) saturate(140%);
          -webkit-backdrop-filter: blur(var(--panel-blur)) saturate(140%);
          border: 1px solid var(--hairline);
          border-radius: 16px;
          box-shadow: inset 0 1px 0 var(--hairline-shine);
          padding: 28px 32px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          color: var(--text);
        }
        .eyebrow {
          font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
          font-size: 11px;
          font-weight: 600;
          color: var(--accent);
          letter-spacing: 0.16em;
          margin-bottom: 8px;
        }
        .title {
          font-size: 24px;
          font-weight: 600;
          letter-spacing: -0.4px;
          margin-bottom: 14px;
        }
        .body {
          font-size: 15px;
          font-weight: 400;
          line-height: 1.55;
          color: var(--muted);
          max-width: 720px;
        }
        @media (prefers-reduced-motion: reduce) {
          .orb { animation: none; }
        }
      </style>
      <div class="canvas">
        <div class="orb"></div>
        <div class="panel">
          <div class="eyebrow">// ABOUT</div>
          <div class="title">Who I am</div>
          <div class="body">
            Co-op student on the IT Support team at SRK Consulting in Vancouver, learning the trade end-to-end: triaging tickets, automating the boring parts, and writing Python tools to make repeat work disappear. Background is in scripting (mostly Python, a little JavaScript) and troubleshooting; current focus is absorbing as much of the tech industry as I can.
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

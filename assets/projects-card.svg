<!-- Projects card -->
<svg fill="none" viewBox="0 0 850 200" width="850" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        :root {
          --canvas:         #fafafa;
          --glass:          rgba(0, 0, 0, 0.035);
          --glass-elevated: rgba(0, 0, 0, 0.04);
          --hairline:       rgba(0, 0, 0, 0.10);
          --hairline-soft:  rgba(0, 0, 0, 0.06);
          --hairline-shine: rgba(255, 255, 255, 0.70);
          --text:           #1a1a1f;
          --muted:          #5a5a64;
          --accent:         #5e6ad2;
        }
        @media (prefers-color-scheme: dark) {
          :root {
            --canvas:         #07080a;
            --glass:          rgba(255, 255, 255, 0.045);
            --glass-elevated: rgba(255, 255, 255, 0.02);
            --hairline:       rgba(255, 255, 255, 0.08);
            --hairline-soft:  rgba(255, 255, 255, 0.05);
            --hairline-shine: rgba(255, 255, 255, 0.18);
            --text:           rgba(255, 255, 255, 0.92);
            --muted:          rgba(255, 255, 255, 0.5);
            --accent:         #7c83ff;
          }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .canvas {
          width: 850px;
          height: 200px;
          background: var(--canvas);
          border-radius: 16px;
          overflow: hidden;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .panel {
          width: 100%;
          height: 100%;
          background: var(--glass);
          backdrop-filter: blur(24px) saturate(140%);
          -webkit-backdrop-filter: blur(24px) saturate(140%);
          border: 1px solid var(--hairline);
          border-radius: 16px;
          box-shadow: inset 0 1px 0 var(--hairline-shine);
          padding: 24px 32px;
          color: var(--text);
          display: flex;
          flex-direction: column;
        }
        .header { margin-bottom: 16px; }
        .eyebrow {
          font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
          font-size: 11px;
          font-weight: 600;
          color: var(--accent);
          letter-spacing: 0.16em;
          margin-bottom: 8px;
        }
        .title {
          font-size: 22px;
          font-weight: 600;
          letter-spacing: -0.3px;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
        }
        .item {
          background: var(--glass-elevated);
          border: 1px solid var(--hairline-soft);
          border-radius: 8px;
          padding: 12px 14px;
        }
        .kind {
          font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
          font-size: 10px;
          font-weight: 500;
          color: var(--accent);
          letter-spacing: 0.14em;
          margin-bottom: 6px;
        }
        .what {
          font-size: 14px;
          font-weight: 600;
          color: var(--text);
          line-height: 1.35;
        }
      </style>
      <div class="canvas">
        <div class="panel">
          <div class="header">
            <div class="eyebrow">// ACTIVE</div>
            <div class="title">What I'm on right now</div>
          </div>
          <div class="grid">
            <div class="item">
              <div class="kind">BUILDING →</div>
              <div class="what">Mini LLM for automated junk-mail triage on a ticketing service</div>
            </div>
            <div class="item">
              <div class="kind">LEARNING →</div>
              <div class="what">Python + scikit-learn for LLM building</div>
            </div>
            <div class="item">
              <div class="kind">CURIOUS ABOUT →</div>
              <div class="what">Prompt engineering</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
